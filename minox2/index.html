<!-- 
  COPIE E COLE ESTE BLOCO NO FINAL DO SEU ARQUIVO, ANTES DO </body> 
  Ele substituirá o sistema antigo automaticamente.
-->
<script>
(function() {
    // --- CONFIGURAÇÕES ---
    const config = {
        intervaloMin: 12000, // 12 segundos
        intervaloMax: 25000, // 25 segundos
        tempoExibicao: 7000,  // 7 segundos visível
        primeiroAtraso: 5000, // 5 segundos após carregar
        probabilidades: {
            compra: 0.6,
            carrinho: 0.25,
            visualizando: 0.15
        }
    };

    const dados = {
        nomes: ['Ricardo', 'Felipe', 'Marcos', 'André', 'Gustavo', 'Lucas', 'Vinícius', 'João', 'Mateus', 'Diego', 'Bruno', 'Thiago', 'Rafael', 'Gabriel', 'Marcelo', 'Rodrigo', 'Alexandre', 'Fernando', 'Samuel', 'Leonardo', 'Carlos', 'Eduardo', 'Henrique', 'Murilo', 'Vitor', 'Adriano', 'Douglas', 'Leandro', 'Tiago', 'Ruan'],
        sobrenomes: ['Silva', 'Santos', 'Oliveira', 'Souza', 'Pereira', 'Costa', 'Ferreira', 'Alves', 'Rocha', 'Mendes', 'Lima', 'Gomes', 'Ribeiro', 'Martins', 'Carvalho', 'Almeida', 'Lopes', 'Soares', 'Fernandes', 'Vieira', 'Barbosa', 'Machado', 'Teixeira', 'Cavalcanti', 'Dias', 'Moreira', 'Nunes', 'Batista'],
        cidades: [
            'São Paulo/SP', 'Rio de Janeiro/RJ', 'Belo Horizonte/MG', 'Curitiba/PR', 'Porto Alegre/RS', 
            'Salvador/BA', 'Brasília/DF', 'Fortaleza/CE', 'Recife/PE', 'Goiânia/GO', 
            'Manaus/AM', 'Campinas/SP', 'São Luís/MA', 'Maceió/AL', 'Natal/RN', 
            'Teresina/PI', 'João Pessoa/PB', 'Aracaju/SE', 'Cuiabá/MT', 'Campo Grande/MS',
            'Joinville/SC', 'Londrina/PR', 'Sorocaba/SP', 'Ribeirão Preto/SP', 'Uberlândia/MG',
            'São José dos Campos/SP', 'Niterói/RJ', 'Belém/PA', 'Florianópolis/SC'
        ],
        produtos: [
            'Kit 3 Frascos (Tratamento Trimestral)',
            'Kit 6 Frascos (Tratamento Semestral)',
            '1 Frasco (Tratamento Mensal)',
            'Kit 12 Frascos (Tratamento Anual)'
        ]
    };

    // --- ESTILOS ---
    const style = document.createElement('style');
    style.innerHTML = `
        #notif-premium-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10001;
            transform: translateX(-130%);
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid #f0f0f0;
            max-width: 340px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            pointer-events: auto;
        }

        #notif-premium-container.show {
            transform: translateX(0);
        }

        .notif-premium-avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .notif-premium-avatar-wrapper img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eef2ff;
            display: block;
        }

        .notif-premium-status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #22c55e;
            border: 2px solid #fff;
            border-radius: 50%;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .notif-premium-content {
            flex: 1;
        }

        .notif-premium-text {
            font-size: 13px;
            color: #334155;
            line-height: 1.5;
            margin: 0;
        }

        .notif-premium-text strong {
            color: #0f172a;
            font-weight: 700;
        }

        .notif-premium-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .notif-premium-time {
            font-size: 11px;
            color: #94a3b8;
        }

        .notif-premium-badge {
            font-size: 9px;
            background: #f1f5f9;
            color: #64748b;
            padding: 2px 8px;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .notif-premium-badge i {
            font-size: 8px;
        }

        .notif-premium-close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #f8fafc;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .notif-premium-close:hover {
            background: #f1f5f9;
            color: #64748b;
        }

        @media (max-width: 768px) {
            #notif-premium-container {
                bottom: 90px; /* Ajustado para ficar acima do botão flutuante mobile */
                left: 10px;
                right: 10px;
                max-width: calc(100% - 20px);
                padding: 10px 12px;
            }
        }
    `;
    document.head.appendChild(style);

    // --- ESTRUTURA ---
    const container = document.createElement('div');
    container.id = 'notif-premium-container';
    document.body.appendChild(container);

    // --- LÓGICA ---
    function getRandom(array) {
        return array[Math.floor(Math.random() * array.length)];
    }

    function formatTime(seconds) {
        if (seconds < 60) return `há ${seconds} segundos`;
        const mins = Math.floor(seconds / 60);
        return `há ${mins} ${mins === 1 ? 'minuto' : 'minutos'}`;
    }

    function showNotification() {
        // Remover notificações antigas do DOM se existirem (limpeza)
        const oldNotif = document.getElementById('liveNotification');
        if (oldNotif) oldNotif.style.display = 'none';

        const rand = Math.random();
        let type = 'compra';
        if (rand > 0.6 && rand <= 0.85) type = 'carrinho';
        else if (rand > 0.85) type = 'visualizando';

        const nome = getRandom(dados.nomes);
        const sobrenome = getRandom(dados.sobrenomes);
        const cidade = getRandom(dados.cidades);
        const produto = getRandom(dados.produtos);
        const photoId = Math.floor(Math.random() * 70);
        const tempoSegundos = Math.floor(Math.random() * 110) + 10;

        let badgeIcon = 'fa-shopping-bag';
        let badgeText = 'Venda Real';
        let contentHtml = '';

        if (type === 'compra') {
            contentHtml = `<strong>${nome} ${sobrenome}</strong> de ${cidade} <br>acabou de comprar <strong>${produto}</strong>`;
            badgeIcon = 'fa-check-circle';
            badgeText = 'Compra Aprovada';
        } else if (type === 'carrinho') {
            contentHtml = `<strong>${nome} ${sobrenome}</strong> de ${cidade} <br>adicionou <strong>${produto}</strong> ao carrinho`;
            badgeIcon = 'fa-shopping-cart';
            badgeText = 'Interesse';
        } else {
            const viewers = Math.floor(Math.random() * 20) + 15;
            contentHtml = `<strong>${nome}</strong> e mais ${viewers} pessoas estão visualizando este produto agora`;
            badgeIcon = 'fa-eye';
            badgeText = 'Ao Vivo';
        }

        container.innerHTML = `
            <button class="notif-premium-close" onclick="document.getElementById('notif-premium-container').classList.remove('show')">&times;</button>
            <div class="notif-premium-avatar-wrapper">
                <img src="https://i.pravatar.cc/100?u=${photoId}" alt="User">
                <div class="notif-premium-status-dot"></div>
            </div>
            <div class="notif-premium-content">
                <p class="notif-premium-text">${contentHtml}</p>
                <div class="notif-premium-meta">
                    <span class="notif-premium-badge"><i class="fas ${badgeIcon}"></i> ${badgeText}</span>
                    <span class="notif-premium-time">${formatTime(tempoSegundos)}</span>
                </div>
            </div>
        `;

        container.classList.add('show');

        setTimeout(() => {
            container.classList.remove('show');
        }, config.tempoExibicao);

        // Agendar próxima
        const proximoIntervalo = Math.floor(Math.random() * (config.intervaloMax - config.intervaloMin)) + config.intervaloMin;
        setTimeout(showNotification, proximoIntervalo);
    }

    // Iniciar após o delay inicial
    setTimeout(showNotification, config.primeiroAtraso);
})();
</script>
